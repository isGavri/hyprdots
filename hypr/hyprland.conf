exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1



################
### MONITORS ###
################
monitor = DP-2, 1920x1080@165, 0x0, 1
monitor = DP-1, 1920x1080@165, 0x0, 1
monitor = , preferred, auto, 1



workspace = 1,monitor:DP-2
workspace = 2,monitor:DP-2
workspace = 3,monitor:DP-2
workspace = 4,monitor:DP-2
workspace = 5,monitor:DP-2
workspace = 6,monitor:DP-2
workspace = 7,monitor:DP-2
workspace = 8,monitor:DP-2
workspace = 9,monitor:DP-2
workspace = 10,monitor:DP-2




###################
### MY PROGRAMS ###
###################
$themes = bash ~/Documents/themes/theme-switcher.sh
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$powermenu = zsh ~/.config/rofi/powermenu.sh
$screenshot = hyprshot -m region -m active --clipboard-only
$hyprlock = hyprlock
$killpanel = killall waybar
$startpanel = waybar


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER 

# Theme changer
bind = alt, C, exec, $themes
# Exec terminal
bind = alt, return, exec, $terminal
# Kill active window
bind = alt, Q, killactive,
# Application launcher
bind = alt, a, exec, $menu
# Exit hyprland
bind = $mainMod, M, exec, uwsm stop
bind = $mainMod, F, fullscreen
bind = $mainMod, E, exec, $fileManager
bind = alt, F, togglefloating,
bind = alt+ctrl, F, centerwindow,
bind = alt, Z, exec, $powermenu
bind = alt, S, togglesplit, 
bind = alt, h, movefocus, l
bind = alt, l, movefocus, r
bind = alt, k, movefocus, u
bind = alt, j, movefocus, d
bind = alt+shift, h, movewindow, l
bind = alt+shift, j, movewindow, d
bind = alt+shift, k, movewindow, u
bind = alt+shift, l, movewindow, r
bind = alt+ctrl, j, resizeactive, -10 -10
bind = alt+ctrl, k, resizeactive, 10 10
bind = $mainMod+shift, l, workspace, +1
bind = $mainMod+shift, h, workspace, -1
bind = alt, F1, exec, $screenshot
bind = $mainMod, L, exec, $hyprlock
bind = $mainMod, K, exec, $killpanel
bind = $mainMod, J, exec, $startpanel
bind = alt, 1, workspace, 1
bind = alt, 2, workspace, 2
bind = alt, 3, workspace, 3
bind = alt, 4, workspace, 4
bind = alt, 5, workspace, 5
bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 5, movetoworkspace, 5
bind = ctrl+alt, l, workspace, +1
bind = ctrl+alt, h, workspace, -1
bind = ctrl+shift,l, movetoworkspacesilent, +1
bind = ctrl+shift, h, movetoworkspacesilent, -1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bind = SUPER, b, exec, pkill waybar || waybar


#################
### AUTOSTART ###
#################



exec-once=waybar
exec-once=swww-daemon
exec-once=swww img ~/Pictures/lake.png
#############################
### ENVIRONMENT VARIABLES ###
#############################


env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
exec-once=hyprctl setcursor rose-pine-hyprcursor 24
exec-once=gsettings set org.gnome.desktop.interface cursor-theme 'rose-pine-hyprcursor' &> /dev/null

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    float_gaps = 10
    border_size = 1
    col.active_border = rgba(f9e2afff) rgba(f9e2afff) 45deg
    col.inactive_border = rgba(00000000)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.9
    inactive_opacity = 0.8
    dim_inactive = true
    dim_strength = 0.1
    shadow {
        enabled = true, glow
        range = 4
        render_power = 2
        color = rgba(f9e2afff)
        color_inactive = rgba(00000000)
    }
    blur {
        enabled = true, blur
        size = 1
        passes = 5

        vibrancy = 0.1696
    }
}
animations {
    enabled = true, animations
        bezier = winIn, 0.1, 1.0, 0.1, 1.0
        bezier = winOut, 0.1, 1.0, 0.1, 1.0
        bezier = smoothOut, 0.5, 0, 0.99, 0.99
        bezier = layerOut,0.23,1,0.32,1
        animation = windowsIn, 1, 7, winIn, slide
        animation = windowsOut, 1, 3, smoothOut, slide
        animation = windowsMove, 1, 7, winIn, slide
        animation = workspacesIn, 1, 8, winIn, slide
        animation = workspacesOut, 1, 8, winOut, slide
        animation = layersIn, 1, 10, winIn, slide
        animation = layersOut, 1, 3, layerOut, popin 50%
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us, latam
    kb_variant =
    kb_model =
    kb_options = grp:alt_space_toggle
    kb_rules =
    accel_profile = flat
    follow_mouse = 1
    sensitivity = 1
    repeat_rate = 50        
    repeat_delay = 200  
    touchpad {
        natural_scroll = false
    }
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
windowrulev2 = float, class:.*
windowrulev2 = size <1280 <720, class:.*
windowrulev2 = size <1280 <720, class:zen
windowrulev2 = center, class:.*
 
